<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail – Portfolio</title>
<style>
  body {
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .mail-window {
    width: 480px;
    margin: 60px auto;
    background: #1e1e1e;
    border-radius: 10px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.4);
    overflow: hidden;
    color: #fff;
  }
  .title-bar {
    background: #2b2b2b;
    display: flex;
    align-items: center;
    padding: 6px 10px;
  }
  .traffic-lights {
    display: flex;
    gap: 8px;
    margin-right: 10px;
  }
  .light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .red { background: #ff5f57; }
  .yellow { background: #ffbd2e; }
  .green { background: #28c840; }
  .title-bar span {
    font-weight: 600;
  }
  .content {
    display: flex;
  }
  .sidebar {
    width: 120px;
    background: #111;
    padding: 20px 0;
  }
  .sidebar div {
    padding: 8px 20px;
    cursor: pointer;
  }
  .sidebar div:hover {
    background: #333;
  }
  .mail-body {
    flex: 1;
    padding: 20px;
  }
  a {
    color: #4ea3ff;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="mail-window">
    <div class="title-bar">
      <div class="traffic-lights">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
      </div>
      <span>Mail</span>
    </div>
    <div class="content">
      <div class="sidebar">
        <div>Inbox</div>
        <div>Welcome</div>
        <div>Updates</div>
        <div>Sent</div>
      </div>
      <div class="mail-body">
        <p><strong>From: </strong> Yashasvee Masani  en23ca503227@medicaps.ac.in </p>
        <h3>Welcome to my Portfolio!</h3>
        <p>Hi there 👋</p>
        <p>
          Thank you for checking out my macOS-style portfolio.
          This Mail app is just for show, but you can reach me at
          <a href="yashasvee2729@gmail.com">yashasvee2729@gmail.com</a>.
        </p>
        <p>Have a great day!</p>
      </div>
    </div>
  </div>
</body>
</html>
